<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Crate Diggers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --espresso:  #1e0f07;
      --walnut:    #2c1a0e;
      --mahogany:  #3d2314;
      --caramel:   #7a4a1e;
      --gold:      #c9a84c;
      --gold-light:#e8c96a;
      --cream:     #f5e6c8;
      --parchment: #ede0c0;
      --ivory:     #fdf6e3;
      --border:    #8b6914;
      --shadow:    rgba(0,0,0,0.55);
    }

    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background-color: var(--walnut);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,0,0,0.08) 40px, rgba(0,0,0,0.08) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.08) 40px, rgba(0,0,0,0.08) 41px);
      color: var(--cream);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, var(--espresso) 0%, var(--mahogany) 100%);
      border-bottom: 3px solid var(--gold);
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      position: relative;
    }
    header::before, header::after {
      content: '♪';
      font-size: 2rem;
      color: var(--gold);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }
    header::before { left: 2rem; }
    header::after  { right: 2rem; }

    .site-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      font-style: italic;
      color: var(--gold);
      text-shadow: 2px 3px 6px var(--shadow);
      letter-spacing: 0.03em;
    }
    .site-subtitle {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--parchment);
      opacity: 0.8;
      margin-top: 0.3rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Owner strip ── */
    #owner-strip {
      background: var(--espresso);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.6rem;
      padding: 0.5rem 1.5rem;
      font-size: 0.78rem;
      flex-wrap: wrap;
    }
    #owner-strip label { color: var(--gold); letter-spacing: 0.08em; }
    #owner-pin-input {
      background: var(--mahogany);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 0.3rem 0.6rem;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.78rem;
      width: 90px;
      letter-spacing: 0.15em;
    }
    #owner-pin-input:focus { outline: none; border-color: var(--gold); }
    .btn-pin {
      background: var(--gold);
      color: var(--espresso);
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 3px;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .btn-pin:hover { background: var(--gold-light); }
    #owner-badge { display: none; color: var(--gold); font-weight: 700; letter-spacing: 0.1em; }
    #owner-badge.visible { display: inline; }
    #pin-error { color: #e06060; font-size: 0.75rem; }

    /* ── Main layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Section headings ── */
    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.4rem;
      margin-bottom: 1.2rem;
      letter-spacing: 0.04em;
    }
    .section-heading span { font-style: italic; }

    /* ── Suggestion form ── */
    #suggest-section {
      background: linear-gradient(135deg, var(--mahogany) 0%, var(--espresso) 100%);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 4px 18px var(--shadow);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem 1.2rem;
    }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .form-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-field.full { grid-column: 1 / -1; }
    .form-field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      font-weight: 700;
    }
    .form-field input,
    .form-field textarea {
      background: var(--walnut);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 0.55rem 0.75rem;
      border-radius: 4px;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.9rem;
      resize: vertical;
    }
    .form-field input:focus,
    .form-field textarea:focus { outline: none; border-color: var(--gold); background: #3a2010; }
    .form-field input::placeholder,
    .form-field textarea::placeholder { color: #7a6040; }

    .art-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .btn-art {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.82rem;
      cursor: pointer;
      letter-spacing: 0.06em;
    }
    .btn-art:hover { background: rgba(201,168,76,0.15); }
    #art-preview {
      width: 56px; height: 56px;
      border-radius: 4px;
      border: 2px solid var(--border);
      object-fit: cover;
      display: none;
    }
    #art-preview.visible { display: block; }
    #art-clear {
      font-size: 0.75rem; color: #a07050;
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
      display: none;
    }
    #art-clear.visible { display: inline; }
    #art-label { font-size: 0.75rem; color: #7a6040; font-style: italic; }

    .form-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; }
    .btn-submit {
      background: linear-gradient(135deg, var(--gold) 0%, #a87c28 100%);
      color: var(--espresso);
      border: none;
      padding: 0.65rem 2rem;
      border-radius: 4px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.06em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .btn-submit:hover { background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    #form-message { font-size: 0.82rem; color: #6ecb82; margin-top: 0.5rem; text-align: right; }
    #form-error   { font-size: 0.82rem; color: #e06060; margin-top: 0.5rem; text-align: right; }

    /* ── Cards ── */
    #loading-msg { text-align: center; color: var(--gold); font-style: italic; padding: 2rem; }
    #empty-msg { text-align: center; color: #7a6040; font-style: italic; padding: 2rem; display: none; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.4rem;
    }
    .card {
      background: linear-gradient(160deg, var(--ivory) 0%, var(--parchment) 100%);
      color: var(--espresso);
      border: 1px solid #c4a86a;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 3px 12px var(--shadow);
      display: flex; flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
    .card.is-bought { opacity: 0.65; }

    .bought-ribbon {
      position: absolute; top: 12px; right: -28px;
      background: #5a8a5a; color: #fff;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 36px;
      transform: rotate(45deg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .card-art {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-bottom: 2px solid #c4a86a; background: #c8b88a;
    }
    .card-art-placeholder {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, #c8b88a 0%, #a89060 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      border-bottom: 2px solid #c4a86a;
    }
    .card-body {
      padding: 0.9rem 1rem; flex: 1;
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .card-album {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--espresso); line-height: 1.2;
    }
    .card-artist { font-size: 0.85rem; color: var(--caramel); font-style: italic; }
    .card-meta { font-size: 0.73rem; color: #6a5030; margin-top: 0.2rem; }
    .card-note {
      font-size: 0.82rem; color: #4a3020; font-style: italic;
      margin-top: 0.3rem;
      border-left: 2px solid var(--border); padding-left: 0.5rem;
    }
    .card-actions {
      display: flex; gap: 0.5rem;
      padding: 0.7rem 1rem;
      border-top: 1px solid #d4b880;
      background: rgba(0,0,0,0.04);
    }
    .btn-bought {
      flex: 1; background: #5a8a5a; color: #fff; border: none;
      padding: 0.4rem 0.7rem; border-radius: 3px;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.75rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em;
    }
    .btn-bought:hover { background: #4a7a4a; }
    .btn-bought.unbought { background: #9a7040; }
    .btn-bought.unbought:hover { background: #8a6030; }
    .btn-delete {
      background: #b04040; color: #fff; border: none;
      padding: 0.4rem 0.7rem; border-radius: 3px;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.75rem; cursor: pointer;
    }
    .btn-delete:hover { background: #903030; }

    /* ── iTunes modal ── */
    #art-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #art-modal.open { display: flex; }
    .modal-box {
      background: linear-gradient(160deg, var(--mahogany) 0%, var(--espresso) 100%);
      border: 1px solid var(--border); border-radius: 8px;
      width: min(520px, 95vw); max-height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); font-style: italic; }
    .modal-close { background: none; border: none; color: var(--parchment); font-size: 1.4rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--gold); }
    .modal-search {
      display: flex; gap: 0.5rem;
      padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border);
    }
    .modal-search input {
      flex: 1; background: var(--walnut); border: 1px solid var(--border);
      color: var(--cream); padding: 0.5rem 0.75rem; border-radius: 4px;
      font-family: 'Libre Baskerville', serif; font-size: 0.9rem;
    }
    .modal-search input:focus { outline: none; border-color: var(--gold); }
    .modal-search button {
      background: var(--gold); color: var(--espresso); border: none;
      padding: 0.5rem 1rem; border-radius: 4px;
      font-family: 'Libre Baskerville', serif; font-weight: 700; cursor: pointer;
    }
    .modal-search button:hover { background: var(--gold-light); }
    .modal-results {
      overflow-y: auto; padding: 1rem 1.2rem;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; flex: 1;
    }
    .modal-status { padding: 1.5rem; text-align: center; color: var(--gold); font-style: italic; font-size: 0.85rem; }
    .art-option {
      cursor: pointer; border-radius: 4px; overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .art-option:hover { border-color: var(--gold); transform: scale(1.04); }
    .art-option img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
    .art-option-label {
      background: rgba(0,0,0,0.65); color: var(--cream);
      font-size: 0.65rem; padding: 3px 5px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    footer {
      text-align: center; padding: 1.5rem;
      font-size: 0.75rem; color: #6a5030;
      border-top: 1px solid var(--mahogany); letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<header>
  <div class="site-title">The Crate Diggers</div>
  <div class="site-subtitle">Community Album Suggestions &mdash; Dig Deep, Play Often</div>
</header>

<div id="owner-strip">
  <span id="owner-badge">&#9733; Owner Mode Active</span>
  <span id="pin-error"></span>
  <label for="owner-pin-input">Owner PIN</label>
  <input type="password" id="owner-pin-input" placeholder="&#9679;&#9679;&#9679;&#9679;" maxlength="20" />
  <button class="btn-pin" id="verify-pin-btn">Unlock</button>
</div>

<main>
  <section id="suggest-section">
    <div class="section-heading"><span>Suggest a Record</span></div>
    <form id="suggest-form">
      <div class="form-grid">
        <div class="form-field">
          <label for="f-artist">Artist</label>
          <input type="text" id="f-artist" placeholder="e.g. John Coltrane" required />
        </div>
        <div class="form-field">
          <label for="f-album">Album</label>
          <input type="text" id="f-album" placeholder="e.g. A Love Supreme" required />
        </div>
        <div class="form-field">
          <label for="f-by">Suggested By</label>
          <input type="text" id="f-by" placeholder="Your name" required />
        </div>
        <div class="form-field">
          <label for="f-note">Note (optional)</label>
          <input type="text" id="f-note" placeholder="Why this album?" />
        </div>
        <div class="art-row">
          <button type="button" class="btn-art" id="open-art-modal">&#9835; Search Album Art</button>
          <img id="art-preview" src="" alt="Selected art" />
          <button type="button" id="art-clear">Remove art</button>
          <span id="art-label"></span>
        </div>
        <div class="form-actions">
          <div>
            <button type="submit" class="btn-submit" id="submit-btn">Add to the Crate</button>
            <div id="form-message"></div>
            <div id="form-error"></div>
          </div>
        </div>
      </div>
    </form>
  </section>

  <section id="suggestions-section">
    <div class="section-heading"><span>The Crate</span></div>
    <div id="loading-msg">Loading records&hellip;</div>
    <div id="empty-msg">No suggestions yet &mdash; be the first to dig!</div>
    <div id="cards-grid" class="cards-grid"></div>
  </section>
</main>

<footer>Crate Diggers &mdash; All grooves preserved &mdash; &#9834;</footer>

<div id="art-modal" role="dialog" aria-modal="true" aria-label="Search album art">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Search Album Art via iTunes</span>
      <button class="modal-close" id="close-art-modal" aria-label="Close">&times;</button>
    </div>
    <div class="modal-search">
      <input type="text" id="itunes-search-input" placeholder="Artist or album name&hellip;" />
      <button id="itunes-search-btn">Search</button>
    </div>
    <div id="itunes-results" class="modal-results">
      <div class="modal-status" style="grid-column:1/-1">Enter an artist or album to search&hellip;</div>
    </div>
  </div>
</div>

<script>
  let ownerMode = false;
  let selectedArtUrl = null;
  let suggestions = [];

  function fmt(ts) {
    return new Date(ts).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Owner PIN ──
  const pinInput   = document.getElementById('owner-pin-input');
  const pinBtn     = document.getElementById('verify-pin-btn');
  const pinError   = document.getElementById('pin-error');
  const ownerBadge = document.getElementById('owner-badge');

  async function verifyPin() {
    const pin = pinInput.value.trim();
    if (!pin) return;
    try {
      const res = await fetch('/api/suggestions/verify-pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      });
      if (res.ok) {
        ownerMode = true;
        ownerBadge.classList.add('visible');
        pinInput.style.display   = 'none';
        pinBtn.style.display     = 'none';
        document.querySelector('#owner-strip label').style.display = 'none';
        pinError.textContent = '';
        renderCards();
      } else {
        pinError.textContent = 'Wrong PIN';
        pinInput.value = '';
      }
    } catch { pinError.textContent = 'Error contacting server.'; }
  }

  pinBtn.addEventListener('click', verifyPin);
  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); verifyPin(); } });

  // ── Load & render ──
  async function loadSuggestions() {
    try {
      const res = await fetch('/api/suggestions');
      suggestions = await res.json();
      renderCards();
    } catch {
      document.getElementById('loading-msg').textContent = 'Failed to load suggestions.';
    }
  }

  function renderCards() {
    const grid    = document.getElementById('cards-grid');
    const loading = document.getElementById('loading-msg');
    const empty   = document.getElementById('empty-msg');

    loading.style.display = 'none';
    grid.innerHTML = '';

    if (!suggestions.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    suggestions.forEach(s => {
      const card = document.createElement('div');
      card.className = 'card' + (s.bought ? ' is-bought' : '');

      const artHtml = s.artUrl
        ? `<img class="card-art" src="${esc(s.artUrl)}" alt="Album art" loading="lazy" />`
        : `<div class="card-art-placeholder">&#9900;</div>`;

      const ribbon = s.bought ? `<div class="bought-ribbon">Bought</div>` : '';
      const noteHtml = s.note ? `<div class="card-note">${esc(s.note)}</div>` : '';

      const actionsHtml = ownerMode ? `
        <div class="card-actions">
          <button class="btn-bought ${s.bought ? 'unbought' : ''}" data-id="${s.id}">
            ${s.bought ? 'Mark Unacquired' : 'Mark Bought'}
          </button>
          <button class="btn-delete" data-id="${s.id}">Delete</button>
        </div>` : '';

      card.innerHTML = `
        ${ribbon}
        ${artHtml}
        <div class="card-body">
          <div class="card-album">${esc(s.album)}</div>
          <div class="card-artist">${esc(s.artist)}</div>
          <div class="card-meta">Suggested by <strong>${esc(s.suggestedBy)}</strong> &mdash; ${fmt(s.timestamp)}</div>
          ${noteHtml}
        </div>
        ${actionsHtml}
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.btn-bought').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = parseInt(btn.dataset.id, 10);
        try {
          const res = await fetch(`/api/suggestions/${id}/bought`, { method: 'PATCH' });
          const updated = await res.json();
          suggestions = suggestions.map(s => s.id === id ? updated : s);
          renderCards();
        } catch { alert('Failed to update.'); }
      });
    });

    grid.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this suggestion?')) return;
        const id = parseInt(btn.dataset.id, 10);
        try {
          const res = await fetch(`/api/suggestions/${id}`, { method: 'DELETE' });
          if (res.ok) {
            suggestions = suggestions.filter(s => s.id !== id);
            renderCards();
          } else { alert('Failed to delete.'); }
        } catch { alert('Failed to delete.'); }
      });
    });
  }

  // ── Submit form ──
  const form      = document.getElementById('suggest-form');
  const submitBtn = document.getElementById('submit-btn');
  const formMsg   = document.getElementById('form-message');
  const formErr   = document.getElementById('form-error');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    formMsg.textContent = '';
    formErr.textContent = '';
    submitBtn.disabled = true;

    const body = {
      artist:      document.getElementById('f-artist').value.trim(),
      album:       document.getElementById('f-album').value.trim(),
      suggestedBy: document.getElementById('f-by').value.trim(),
      note:        document.getElementById('f-note').value.trim(),
      artUrl:      selectedArtUrl || null
    };

    try {
      const res = await fetch('/api/suggestions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        const created = await res.json();
        suggestions.unshift(created);
        renderCards();
        form.reset();
        clearArt();
        formMsg.textContent = 'Record added to the crate!';
        setTimeout(() => { formMsg.textContent = ''; }, 3000);
      } else {
        const data = await res.json();
        formErr.textContent = data.error || 'Submission failed.';
      }
    } catch { formErr.textContent = 'Network error.'; }
    finally { submitBtn.disabled = false; }
  });

  // ── Art picker ──
  const artModal      = document.getElementById('art-modal');
  const openArtBtn    = document.getElementById('open-art-modal');
  const closeArtBtn   = document.getElementById('close-art-modal');
  const artPreview    = document.getElementById('art-preview');
  const artClearBtn   = document.getElementById('art-clear');
  const artLabel      = document.getElementById('art-label');
  const itunesInput   = document.getElementById('itunes-search-input');
  const itunesBtn     = document.getElementById('itunes-search-btn');
  const itunesResults = document.getElementById('itunes-results');

  openArtBtn.addEventListener('click', () => { artModal.classList.add('open'); itunesInput.focus(); });
  closeArtBtn.addEventListener('click', () => artModal.classList.remove('open'));
  artModal.addEventListener('click', e => { if (e.target === artModal) artModal.classList.remove('open'); });
  itunesBtn.addEventListener('click', searchItunes);
  itunesInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchItunes(); });

  async function searchItunes() {
    const q = itunesInput.value.trim();
    if (!q) return;
    itunesResults.innerHTML = '<div class="modal-status" style="grid-column:1/-1">Searching&hellip;</div>';
    try {
      const url = `https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=album&limit=9&media=music`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.results || !data.results.length) {
        itunesResults.innerHTML = '<div class="modal-status" style="grid-column:1/-1">No results found.</div>';
        return;
      }
      itunesResults.innerHTML = '';
      data.results.forEach(item => {
        const bigArt = (item.artworkUrl100 || '').replace('100x100bb', '400x400bb');
        const el = document.createElement('div');
        el.className = 'art-option';
        el.title = `${item.artistName} — ${item.collectionName}`;
        el.innerHTML = `
          <img src="${esc(bigArt)}" alt="${esc(item.collectionName)}" loading="lazy" />
          <div class="art-option-label">${esc(item.artistName)}<br>${esc(item.collectionName)}</div>
        `;
        el.addEventListener('click', () => {
          selectArt(bigArt, `${item.artistName} — ${item.collectionName}`);
          artModal.classList.remove('open');
        });
        itunesResults.appendChild(el);
      });
    } catch {
      itunesResults.innerHTML = '<div class="modal-status" style="grid-column:1/-1">Search failed. Try again.</div>';
    }
  }

  function selectArt(url, label) {
    selectedArtUrl = url;
    artPreview.src = url;
    artPreview.classList.add('visible');
    artClearBtn.classList.add('visible');
    artLabel.textContent = label;
  }

  function clearArt() {
    selectedArtUrl = null;
    artPreview.src = '';
    artPreview.classList.remove('visible');
    artClearBtn.classList.remove('visible');
    artLabel.textContent = '';
  }

  artClearBtn.addEventListener('click', clearArt);

  loadSuggestions();
</script>
</body>
</html>
